<!doctype html>
<html lang="uk">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>@nan0web/release — Anti-Gravity Protocol</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
		<style>
			:root {
				--ba-surface: #0a0e14;
				--ba-card: rgba(255, 255, 255, 0.03);
				--ba-border: rgba(255, 255, 255, 0.1);
				--co-primary: #00f2fe;
				--co-secondary: #ff00ff;
				--co-text: #e8e8e8;
				--co-muted: #8a8a9a;
				--font-main: 'Outfit', sans-serif;
				--font-mono: 'JetBrains Mono', monospace;
				--gap: 2rem;
				--radius: 12px;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				background: var(--ba-surface);
				color: var(--co-text);
				font-family: var(--font-main);
				line-height: 1.6;
				overflow-x: hidden;
			}

			.layout {
				display: grid;
				grid-template-columns: 280px 1fr;
				min-height: 100vh;
			}

			/* Sidebar */
			.sidebar {
				background: rgba(10, 14, 20, 0.8);
				backdrop-filter: blur(20px);
				border-right: 1px solid var(--ba-border);
				padding: 2.5rem 1.5rem;
				height: 100vh;
				position: sticky;
				top: 0;
				display: flex;
				flex-direction: column;
			}

			.logo {
				display: flex;
				align-items: center;
				gap: 0.75rem;
				margin-bottom: 3rem;
				text-decoration: none;
				color: white;
				font-weight: 700;
				font-size: 1.25rem;
				letter-spacing: -0.02em;
			}

			.logo svg {
				width: 32px;
				height: 32px;
				color: var(--co-primary);
			}

			.nav-group {
				margin-bottom: 2rem;
			}

			.nav-group h3 {
				font-size: 0.75rem;
				text-transform: uppercase;
				color: var(--co-muted);
				letter-spacing: 0.1em;
				margin-bottom: 1rem;
				padding-left: 0.5rem;
			}

			.nav-link {
				display: flex;
				align-items: center;
				gap: 0.75rem;
				padding: 0.75rem 1rem;
				color: var(--co-text);
				text-decoration: none;
				border-radius: var(--radius);
				transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
				font-size: 0.9375rem;
				margin-bottom: 0.25rem;
			}

			.nav-link:hover {
				background: var(--ba-card);
				color: var(--co-primary);
			}

			.nav-link.active {
				background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(255, 0, 255, 0.05));
				border: 1px solid var(--ba-border);
				color: var(--co-primary);
			}

			/* Main Content */
			.main {
				padding: 3rem 5rem;
				max-width: 1000px;
				margin: 0 auto;
			}

			.hero {
				position: relative;
				margin-bottom: 4rem;
				border-radius: 20px;
				overflow: hidden;
				aspect-ratio: 21 / 9;
				display: flex;
				align-items: center;
				justify-content: center;
				background: black;
				box-shadow: 0 30px 60px rgba(0,0,0,0.4);
			}

			.hero img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				opacity: 0.8;
			}

			.hero-overlay {
				position: absolute;
				inset: 0;
				background: linear-gradient(to top, var(--ba-surface), transparent);
			}

			.hero-content {
				position: absolute;
				bottom: 2rem;
				left: 2rem;
			}

			.hero-content h1 {
				font-size: 3rem;
				font-weight: 700;
				margin-bottom: 0.5rem;
				background: linear-gradient(to right, #fff, var(--co-muted));
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
			}

			/* Documentation Content Styles */
			.content-area-rendered {
				animation: fadeIn 0.5s ease-out;
			}

			@keyframes fadeIn {
				from { opacity: 0; transform: translateY(10px); }
				to { opacity: 1; transform: translateY(0); }
			}

			h1, h2, h3 { margin-bottom: 1.5rem; color: white; }
			h1 { font-size: 2.5rem; }
			h2 { font-size: 1.75rem; margin-top: 3rem; border-bottom: 1px solid var(--ba-border); padding-bottom: 0.5rem; }
			p { margin-bottom: 1.25rem; color: var(--co-text); opacity: 0.9; }
			code { font-family: var(--font-mono); background: var(--ba-card); padding: 0.2rem 0.4rem; border-radius: 4px; border: 1px solid var(--ba-border); }
			pre { background: var(--ba-card); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--ba-border); margin-bottom: 2rem; overflow-x: auto; }
			pre code { background: none; border: none; padding: 0; }
			ul { margin-left: 1.5rem; margin-bottom: 1.5rem; }
			li { margin-bottom: 0.5rem; }

			/* Glass Card */
			.card {
				background: var(--ba-card);
				backdrop-filter: blur(10px);
				border: 1px solid var(--ba-border);
				padding: 2rem;
				border-radius: var(--radius);
				margin-bottom: 2rem;
			}

			footer {
				margin-top: 5rem;
				padding-top: 2rem;
				border-top: 1px solid var(--ba-border);
				color: var(--co-muted);
				font-size: 0.875rem;
				display: flex;
				justify-content: space-between;
			}
		</style>
	</head>
	<body>
		<div class="layout">
			<aside class="sidebar">
				<a href="index.html" class="logo">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
					NaN0•RELEASE
				</a>

				<nav class="nav-group">
					<h3>Documentation</h3>
					<a href="pages/getting-started.md" class="nav-link active">Getting Started</a>
					<a href="pages/api.md" class="nav-link">API Reference</a>
					<a href="pages/examples.md" class="nav-link">Examples</a>
					<a href="pages/economy.md" class="nav-link">Economy & Themes</a>
				</nav>

				<nav class="nav-group">
					<h3>History</h3>
					<a href="pages/changelog.md" class="nav-link">Changelog</a>
					<a href="../../releases/index.md" class="nav-link">Release Notes</a>
				</nav>
			</aside>

			<main class="main">
				<div class="hero">
					<img src="assets/hero.png" alt="Anti-Gravity Protocol">
					<div class="hero-overlay"></div>
					<div class="hero-content">
						<h1>Security Through Gravity Defiance</h1>
					</div>
				</div>

				<div id="app-content" class="content-area-rendered">
					<!-- Markdown content will be rendered here dynamically -->
					<div class="card">
						<p>Loading the Anti-Gravity Release Protocol Documentation...</p>
					</div>
				</div>

				<footer>
					<span>© 2026 NaN0web Ecosystem</span>
					<span>v1.0.3 Stable</span>
				</footer>
			</main>
		</div>

		<script type="module">
			import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';

			const appContent = document.getElementById('app-content');
			const navLinks = document.querySelectorAll('.nav-link');

			async function loadPage(url) {
				try {
					const response = await fetch(url);
					const markdown = await response.text();
					appContent.innerHTML = marked.parse(markdown);
					
					// Update Active state
					navLinks.forEach(link => {
						if (link.getAttribute('href') === url) link.classList.add('active');
						else link.classList.remove('active');
					});

					// Re-syntax highlight if needed
					// ...
				} catch (err) {
					appContent.innerHTML = `<div class="card"><h2>Error</h2><p>Failed to load ${url}</p></div>`;
				}
			}

			// Handle sidebar clicks
			navLinks.forEach(link => {
				link.addEventListener('click', (e) => {
					e.preventDefault();
					const url = link.getAttribute('href');
					if (url.startsWith('http')) return window.open(url, '_blank');
					loadPage(url);
					history.pushState(null, '', '#' + url);
				});
			});

			// Initial load
			const hash = window.location.hash.substring(1);
			loadPage(hash || 'pages/getting-started.md');
		</script>
	</body>
</html>
